# Frontend CI — Plan 2026-06-18-002 U3.
# Net-new lane: the repo had no Node toolchain before this. Lints/tests/builds
# the Vue SPA so the build can't rot and the ported kernel stays green.
name: frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - "webui_app/static/css/**" # shared design tokens consumed by the SPA
      - "webui_app/api/**" # API shape changes break the SPA's typed client (U12)
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint, zero-warning baseline)
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm run test
      - name: Production build
        run: npm run build
