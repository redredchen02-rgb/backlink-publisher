[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "backlink-publisher"
version = "0.5.0"
description = "A local-first backlink publishing pipeline for Blogger and Medium."
requires-python = ">=3.11"
dependencies = [
    "markdown-it-py>=4.2",
    "google-api-python-client>=2.196,<3",
    "google-auth-oauthlib>=1.4",
    "google-auth-httplib2>=0.2",
    "requests>=2.32.4,<3",
    "websocket-client>=1.9",
    "beautifulsoup4>=4.13,<5",
    "flask>=3.1,<4",
    "flask-limiter>=3.5,<5",
    "apscheduler>=3.11,<4",
    "apiflask>=3.1,<4",
    "pydantic>=2.5",
    "pyyaml>=6.0.3",
    "structlog>=24.1,<27",
    "flask-compress>=1.14,<2",
    "waitress>=3.0,<4",
]

[project.optional-dependencies]
# radon is pinned to exact version (deviates from house `>=` style) because SLOC counts
# must be deterministic across CI matrix rows; bumping radon requires re-measuring all
# 5 monolith ceilings in the same PR. See docs/plans/2026-05-18-006-feat-monolith-sloc-ceiling-plan.md.
# ruff is pinned to exact version for deterministic lint results on CI.
# playwright is in dev (not core) deps: runtime treats it as the optional
# [browser] extra with graceful DependencyError paths, but the unit suite
# imports playwright types directly (medium/telegraph browser-chain tests),
# so CI's `pip install -e ".[dev]"` must provide the package.
dev = ["pytest>=8.4", "pytest-mock>=3.15", "pytest-timeout>=2.4", "pytest-socket>=0.7", "pytest-env>=1.6", "pytest-asyncio>=1.1,<2", "pytest-xdist>=3.6", "pytest-cov>=6.0", "pytest-benchmark>=5.1", "pytest-rerunfailures>=14.0", "hypothesis>=6.151", "radon==6.0.1", "ruff>=0.15,<1", "mypy>=1.8", "mutmut>=2.4", "vulture>=2.16", "import-linter>=1.6", "pip-audit>=2.7", "playwright>=1.55,<2"]
# browser: Playwright for browser-based publishing and credential binding
browser = ["playwright>=1.55,<2"]
# analytics: Google Analytics Data API for referral attribution and click tracking
analytics = ["google-analytics-data>=0.18,<1"]
# webwright: Microsoft Research's browser agent framework (microsoft/Webwright).
# The PyPI package "webwright==0.0.7" is an unrelated project from MittaAI and MUST NOT be used.
# Pin to a specific commit SHA -- upstream is in rapid iteration with no formal releases.
# Upgrade manually after evaluating upstream changelog: https://github.com/microsoft/Webwright/commits/main
dev-webwright = ["webwright @ git+https://github.com/microsoft/Webwright.git@4a46f282ec37f27d6003cc498a977939d62d9015"]

