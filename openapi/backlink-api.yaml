info:
  description: 'Versioned JSON API for the Backlink Publisher WebUI (Plan 2026-06-18-002,
    front/back separation). Single-origin: served same-origin by Flask. Errors use
    RFC 9457 problem+json.'
  title: Backlink Publisher WebUI API
  version: 0.3.0
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Liveness probe.
      description: Returns service liveness and version. No auth, no side effects.
      tags:
      - meta
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '404':
          description: Unknown API resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/app-config:
    get:
      operationId: getAppConfig
      summary: SPA bootstrap config (edition, Pro status, version).
      description: Origin-guarded GET. Replaces the Jinja context-processor injection.
      tags:
      - bootstrap
      responses:
        '200':
          description: Bootstrap config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'
        '403':
          description: Cross-origin / DNS-rebinding GET rejected.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/csrf-token:
    get:
      operationId: getCsrfToken
      summary: Per-session CSRF token for the SPA fetch layer.
      description: Origin-guarded GET. Re-read per mutating call; never cache.
      tags:
      - bootstrap
      responses:
        '200':
          description: CSRF token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfToken'
        '403':
          description: Cross-origin / DNS-rebinding GET rejected.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/platforms:
    get:
      operationId: getPlatforms
      summary: Full registered-platform list.
      tags:
      - bootstrap
      responses:
        '200':
          description: Platform list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformList'
  /api/v1/bound-platforms:
    get:
      operationId: getBoundPlatforms
      summary: Bound + manifest-visible platforms (publish-form filter).
      tags:
      - bootstrap
      responses:
        '200':
          description: Bound platform list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformList'
  /api/v1/pro-status:
    get:
      operationId: getProStatus
      summary: Pro-Mode visibility summary (redaction-safe).
      tags:
      - bootstrap
      responses:
        '200':
          description: Pro status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProStatusEnvelope'
  /api/v1/pipeline/plan:
    post:
      operationId: planBacklinks
      summary: Generate article plans for the given URLs.
      description: 'Stateless: takes inputs in the body, returns plan rows.'
      tags:
      - pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Generated plan rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '422':
          description: Invalid request (e.g. missing urls).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '502':
          description: Generation failed or produced no output.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/pipeline/preview:
    post:
      operationId: previewBacklink
      summary: Single-article preview (plan one seed, return first row).
      tags:
      - pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: First planned row (or null).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
        '422':
          description: Invalid request.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '502':
          description: Generation failed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/pipeline/validate:
    post:
      operationId: validateBacklinks
      summary: Validate plan rows (URL checks skipped server-side).
      tags:
      - pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: Validated rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '422':
          description: Invalid request or validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/pipeline/publish:
    post:
      operationId: publishBacklinks
      summary: Publish validated rows to a platform (synchronous).
      description: Partial success returns 200 with per-row outcomes in `results`;
        total failure is a problem+json. No pollable task-id (synchronous).
      tags:
      - pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Aggregate publish result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
        '400':
          description: Credential precondition failed (e.g. velog).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Auth/credential error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Invalid request.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '502':
          description: Publish failed / no result rows.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/history:
    get:
      operationId: getHistory
      summary: Full publish-history list.
      tags:
      - history
      responses:
        '200':
          description: History list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryList'
  /api/v1/history/delete:
    post:
      operationId: deleteHistoryItem
      summary: "Delete one history entry \u2192 refreshed list."
      tags:
      - history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryIdRequest'
      responses:
        '200':
          description: Refreshed list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryMutationResult'
        '422':
          description: Missing id.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/history/bulk-delete:
    post:
      operationId: bulkDeleteHistory
      summary: "Delete multiple history entries \u2192 refreshed list."
      tags:
      - history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryIdsRequest'
      responses:
        '200':
          description: Refreshed list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryMutationResult'
        '422':
          description: Missing ids.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/history/purge-failed:
    post:
      operationId: purgeFailedHistory
      summary: "Delete every 'failed' entry \u2192 refreshed list."
      tags:
      - history
      responses:
        '200':
          description: Refreshed list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryMutationResult'
  /api/v1/history/recheck:
    post:
      operationId: recheckHistoryItem
      summary: "Re-verify one history entry's link liveness \u2192 refreshed list."
      tags:
      - history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryIdRequest'
      responses:
        '200':
          description: Refreshed list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryMutationResult'
        '404':
          description: History item not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Missing id.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/monitor/summary:
    get:
      operationId: getMonitorSummary
      summary: Anomaly-first monitor aggregate (today's anomalies first).
      description: Fail-open aggregate across credentials/keepalive/equity/history.
        Severity + equity-gap computed server-side (single source); the SPA only displays.
        Versioned binding of the legacy /api/monitor-hub feed.
      tags:
      - monitor
      responses:
        '200':
          description: Anomaly-first card feed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorSummary'
  /api/v1/pipeline/regen-body:
    post:
      operationId: regenArticleBody
      summary: Re-generate one article body via the configured LLM.
      tags:
      - pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenBodyRequest'
      responses:
        '200':
          description: Regenerated body (markdown + html).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegenBodyResponse'
        '400':
          description: LLM not configured.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Invalid request.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '502':
          description: LLM call failed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
openapi: 3.1.0
components:
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          description: Always 'ok' when the service is up.
        api_version:
          type: string
          description: Major API version, e.g. 'v1'.
        version:
          type: string
          description: backlink-publisher package version.
      required:
      - api_version
      - status
      - version
      additionalProperties: false
    ProblemErrorItem:
      type: object
      properties:
        field:
          type: string
          description: JSON pointer / field name.
        message:
          type: string
          description: Human-readable reason.
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: Stable problem-type URI.
        title:
          type: string
        status:
          type: integer
          description: Matches the HTTP status code.
        detail:
          type: string
        instance:
          type: string
        error_class:
          type: string
          description: CLI/pipeline typed-error class, when applicable.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ProblemErrorItem'
      required:
      - status
      - title
      - type
      additionalProperties: false
    Platform:
      type: object
      properties:
        slug:
          type: string
        display_name:
          type: string
      required:
      - display_name
      - slug
      additionalProperties: false
    PlatformList:
      type: object
      properties:
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
      required:
      - platforms
      additionalProperties: false
    ProStatus:
      type: object
      properties:
        configured:
          type: boolean
        endpoint_host:
          type: string
        model:
          type: string
        article_gen:
          type: boolean
        image_gen:
          type: boolean
        last_test: {}
      required:
      - configured
      additionalProperties: false
    ProStatusEnvelope:
      type: object
      properties:
        pro_status:
          $ref: '#/components/schemas/ProStatus'
      required:
      - pro_status
      additionalProperties: false
    AppConfig:
      type: object
      properties:
        api_version:
          type: string
        version:
          type: string
        lite_edition:
          type: boolean
        pro_status:
          $ref: '#/components/schemas/ProStatus'
        llm_configured:
          type: boolean
      required:
      - api_version
      - lite_edition
      - llm_configured
      - pro_status
      - version
      additionalProperties: false
    CsrfToken:
      type: object
      properties:
        csrf_token:
          type: string
      required:
      - csrf_token
      additionalProperties: false
    PlanRequest:
      type: object
      properties:
        urls:
          type: array
          description: Target URLs; urls[0] is the main URL.
          items:
            type: string
        platform:
          type: string
          default: blogger
        url_mode:
          type: string
          default: C
        publish_mode:
          type: string
          default: publish
        target_language:
          type: string
          default: zh-CN
        custom_title:
          type: string
          default: ''
        custom_tags:
          type: string
          default: ''
        fetch_tdk:
          type: string
          default: 'no'
          description: '''yes'' fetches TDK for anchor suggestions (network).'
      required:
      - urls
      additionalProperties: false
    PlanResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - plans
      additionalProperties: false
    PreviewResponse:
      type: object
      properties:
        plan:
          type:
          - object
          - 'null'
          additionalProperties: {}
      required:
      - plan
      additionalProperties: false
    ValidateRequest:
      type: object
      properties:
        plans:
          description: JSONL string or array of plan-row objects.
      required:
      - plans
      additionalProperties: false
    ValidateResponse:
      type: object
      properties:
        validated:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - validated
      additionalProperties: false
    PublishRequest:
      type: object
      properties:
        plans:
          description: JSONL string or array of validated plan rows.
        platform:
          type: string
        publish_mode:
          type: string
          default: publish
        tier_1:
          type: boolean
          default: false
          description: Restrict to dofollow Tier-1 platforms only.
        target_language:
          type: string
          default: zh-CN
        target_url:
          type: string
          description: Optional hint to enrich history on total failure.
      required:
      - plans
      - platform
      additionalProperties: false
    PublishResponse:
      type: object
      properties:
        state:
          type: string
          description: all_success | partial_success.
        n_ok:
          type: integer
        n_total:
          type: integer
        failure_detail:
          type: string
          description: Joined per-row failure messages (partial_success).
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - n_ok
      - n_total
      - results
      - state
      additionalProperties: false
    RegenBodyRequest:
      type: object
      properties:
        main_domain:
          type: string
        anchors:
          type: array
          items:
            type: string
        language:
          type: string
          default: ''
        topic:
          type:
          - string
          - 'null'
      required:
      - anchors
      - main_domain
      additionalProperties: false
    RegenBodyResponse:
      type: object
      properties:
        content_markdown:
          type: string
        content_html:
          type: string
        content_source:
          type: string
      required:
      - content_html
      - content_markdown
      - content_source
      additionalProperties: false
    MonitorAction:
      type: object
      properties:
        label:
          type: string
        href:
          type: string
      required:
      - href
      - label
      additionalProperties: false
    MonitorCard:
      type: object
      properties:
        key:
          type: string
        title:
          type: string
        severity:
          type: string
          description: danger | warning | ok | info.
        headline:
          type: string
        detail:
          type: string
        deep_link:
          type: string
          description: Legacy page to drill into.
        action:
          anyOf:
          - $ref: '#/components/schemas/MonitorAction'
          - type: 'null'
      required:
      - deep_link
      - detail
      - headline
      - key
      - severity
      - title
      additionalProperties: false
    MonitorSummary:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: '#/components/schemas/MonitorCard'
        anomaly_count:
          type: integer
          description: Count of danger+warning cards.
        degraded:
          type: boolean
          description: True if the aggregator itself failed.
      required:
      - anomaly_count
      - cards
      - degraded
      additionalProperties: false
    HistoryItem:
      type: object
      properties:
        id:
          type: string
        target_url:
          type: string
        created_at:
          type: string
        platform:
          type: string
        status:
          type: string
          description: published | failed | unknown.
        article_urls:
          type: array
          items:
            type: string
        run_id:
          type: string
        language:
          type: string
        error:
          type: string
        verified_at:
          type:
          - integer
          - 'null'
        publish_mode:
          type: string
        target_dofollow:
          type: string
          description: dofollow | dofollow_lost | stripped | unverified.
      required:
      - id
      - target_url
      additionalProperties: false
    HistoryList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'
      required:
      - items
      additionalProperties: false
    HistoryMutationResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'
        message:
          type: string
      required:
      - items
      additionalProperties: false
    HistoryIdRequest:
      type: object
      properties:
        id:
          type: string
      required:
      - id
      additionalProperties: false
    HistoryIdsRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
      required:
      - ids
      additionalProperties: false
