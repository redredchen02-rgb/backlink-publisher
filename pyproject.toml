[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
# Ruff configuration -- unified Python linter and formatter.
# Replaces black/flake8/isort for this project.
# See https://docs.astral.sh/ruff/ for all options.

# Target Python version
target-version = "py311"

# Line length matching project convention
line-length = 100

[tool.ruff.lint]
# Start with rules that catch real bugs and enforce style.
# F = pyflakes (errors), E/W = pycodestyle (convention),
# UP = pyupgrade (Python 3.11+ idioms), I = isort (import ordering).
select = [
    "F",    # pyflakes errors
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "UP",   # pyupgrade
    "I",    # isort
]

# 2026-07-06 (hardening-sweep C1): deliberately NOT enabling flake8-blind-except
# (BLE, e.g. BLE001 "blind except Exception") here. This project already governs
# `except Exception` hygiene via `debt_registry.toml` + `# debt: <slug>` site
# comments (the methodology established in Phase 3 D2); adding BLE001 on top would
# require a per-site `# noqa: BLE001` for every judged-acceptable broad catch
# (~465 sites at last count), duplicating the tracking the debt registry already
# provides instead of adding new signal. C1 only removed the ~218 `# noqa: BLE001`
# comments that were dead (BLE was never enabled, so they suppressed nothing) plus
# other noqa already redundant with per-file-ignores below -- it did not change this
# select list. Re-evaluate enabling BLE once the D2/D3 except-Exception
# classification work (see this repo's hardening-sweep plan, Sprint D) has
# produced enough data to judge whether a second, rule-based governance layer is
# actually worth the duplication.

# Rules we explicitly allow for this codebase's patterns
ignore = [
    "E501",  # line-too-long -- handled by formatter
]

# Per-file rule overrides
[tool.ruff.lint.per-file-ignores]
# Test files: allow short variable names, multi-statement lines, etc.
"tests/*" = [
    "E741",   # ambiguous-variable-name -- test helpers use single-letter vars
    "E702",   # multiple-statements-on-one-line -- test idioms
    "E731",   # lambda-assignment -- test patterns
    "UP038",  # isinstance() with union -- tests use this pattern
    "F401",   # unused-import -- test fixtures import for side effects
]
# __init__.py files: allow F401 for re-exports + E402 for late re-exports
"*/__init__.py" = [
    "F401",   # unused-import -- re-exports are intentional
    "E402",   # module-import-not-at-top-of-file -- late re-exports
]
# Generated/migration files: be lenient
"**/migrations/*" = ["E402"]
# Adapters with mimetypes.add_type() side-effect before module imports
"src/backlink_publisher/publishing/adapters/blogger_api.py" = ["E402"]
"src/backlink_publisher/publishing/adapters/telegraph_api.py" = ["E402"]
# Registry: imports after logger setup is structural
"src/backlink_publisher/publishing/registry.py" = ["E402"]
# Adapters __init__: mid-module imports for catalog registration
"src/backlink_publisher/publishing/adapters/__init__.py" = ["E402"]
# _verify_setup: imports after docstring for clarity
"src/backlink_publisher/publishing/_verify_setup.py" = ["E402"]
# WebUI v1 __init__: Flask blueprint pattern with late imports
"webui_app/api/v1/__init__.py" = ["E402"]
# settings_credentials: imports after dict definitions for readability
"webui_app/api/v1/settings_credentials.py" = ["E402"]
# oauth routes: imports after constants for readability
"webui_app/routes/oauth.py" = ["E402"]
# http_session / content/fetch: SSL context import after module-level constants
"src/backlink_publisher/_util/http_session.py" = ["E402"]
"src/backlink_publisher/content/fetch.py" = ["E402"]
# events/_project_reducers: re-exports at module end
"src/backlink_publisher/events/_project_reducers.py" = ["E402"]
# _publish_helpers: re-exports from _publish_cli (monolith split re-exports)
"src/backlink_publisher/cli/_publish_helpers.py" = ["F401"]
# webui_store/sqlite_base: imports after module-level constants
"webui_store/sqlite_base.py" = ["E402"]

[tool.ruff.lint.isort]
# Sort imports with known-first-party and section ordering
known-first-party = ["backlink_publisher", "webui_app", "webui_store"]
force-sort-within-sections = true
order-by-type = false

[tool.ruff.format]
# Match the project's existing style (no trailing commas, etc.)
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true

[tool.pytest.ini_options]
# PYTHONHASHSEED=0 is required by the Footprint Regression Gate
# (tests/test_footprint_regression.py + R10 from Plan 2026-05-18-007).
# Set here via pytest-env so `pytest tests/` works out of the box locally;
# .github/workflows/ci.yml also pins it at the job level for belt+suspenders.
env = ["PYTHONHASHSEED=0"]
# Defensive: zero @pytest.mark.asyncio markers exist in the tree (confirmed
# at Wave 3 time). strict mode is already the default in pytest-asyncio 1.x
# but is declared explicitly so any future async-fixture conversion surfaces
# a clear error rather than a silent mode mismatch.
asyncio_mode = "strict"
# webui_app/ and webui_store/ live at the repo root (not under src/), so any
# test that imports them (e.g. tests/test_bind_channel_driver.py) used to
# require `PYTHONPATH=.`. This pin makes `pytest tests/` collect them out
# of the box from any worktree without a per-tree environment hack.
pythonpath = [".", "src"]
markers = [
    "real_ssrf_check: exercise the real _check_url_for_ssrf path instead of the default-bypass autouse fixture (tests/test_content_fetch.py)",
    "real_content_fetch: exercise the real content_fetch.verify_urls_batch / verify_url_has_content path instead of the default-pass autouse fixture (tests/test_content_fetch.py applies this module-wide)",
    "real_image_gen: exercise the real FRW image-gen endpoint instead of mocking; opt-in operator-only, never runs in CI (Plan 2026-05-20-001 Unit 2)",
    "real_browser_publish_smoke: open live channel compose URL in attached Chrome and verify selectors against current DOM; opt-in operator-only (Plan 2026-05-21-001 Unit 4a+)",
    "real_live_publish: run the real-credential non-author publish path against a throwaway account in draft mode; opt-in operator-only, never runs in CI (Plan 2026-06-05-008 R7/R8)",
    "unit: fast, isolated tests with no external dependencies; run on every push (default tier)",
    "integration: tests that touch disk, database, or external services; run on CI per-PR",
    "e2e: full end-to-end tests requiring real network or browser; opt-in, run pre-merge or nightly",
    "seam: test module directly imports a seam module (backlink_publisher.events/gap/idempotency/ledger or webui_app.api) -- auto-applied by conftest.py's import-based AST scan (Plan 2026-06-30-001 C1a); excluded from --reruns in ci.yml so a real intermittent failure in these I/O/state-heavy modules can't be silently retried away",
]

[tool.towncrier]
package = "backlink_publisher"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
version = "0.5.0"

[tool.coverage.run]
source = ["backlink_publisher"]
relative_files = true
branch = true
omit = ["*/tests/*", "*/.egg/*"]

[tool.coverage.report]
show_missing = true
skip_covered = true
skip_empty = true
fail_under = 80

[tool.coverage.json]
pretty_print = true

# -- import-linter ----------------------------------------------------------
# Static import-graph enforcement. Uses `forbidden` contracts (not `layers`)
# because domain packages may legitimately import each other; only the
# cli->domain->_util direction must be enforced one-way.
# See docs/plans/2026-06-24-002-refactor-codebase-decoupling-plan.md U7.

[tool.importlinter]
root_packages = ["backlink_publisher"]

[[tool.importlinter.contracts]]
name = "Domain packages must not import from cli/"
type = "forbidden"
source_modules = [
    "backlink_publisher.publishing",
    "backlink_publisher.keepalive",
    "backlink_publisher.events",
    "backlink_publisher.anchor",
    "backlink_publisher._validate_engine",
    "backlink_publisher._util",
    "backlink_publisher.config",
    "backlink_publisher.content",
    "backlink_publisher.linkcheck",
    "backlink_publisher.gap",
    "backlink_publisher.recheck",
    "backlink_publisher.referral",
    "backlink_publisher.health",
    "backlink_publisher.canary",
    "backlink_publisher.ledger",
    "backlink_publisher.idempotency",
    "backlink_publisher.optimization",
    "backlink_publisher.scorecard",
    "backlink_publisher._dispatch_router",
    "backlink_publisher.gates",
    "backlink_publisher.schedule",
    "backlink_publisher.audit",
    "backlink_publisher.geo",
    "backlink_publisher.click_track",
    "backlink_publisher.comment_outreach",
    "backlink_publisher.llm",
    "backlink_publisher.gsc",
]
forbidden_modules = ["backlink_publisher.cli"]
# Pre-existing violations that require deeper refactoring (deferred):
ignore_imports = [
    # publishing.adapters.instant_web -> cli._bind.chrome_backend
    "backlink_publisher.publishing.adapters.instant_web -> backlink_publisher.cli._bind.chrome_backend",
    # SDK -> CLI (SDK wraps CLI commands; layer fixing deferred)
    "backlink_publisher.sdk._publish_runtime -> backlink_publisher.cli.publish_backlinks",
    "backlink_publisher.sdk._publish_runtime -> backlink_publisher.cli._publish_helpers",
    "backlink_publisher.sdk.api -> backlink_publisher.cli.plan_backlinks._engine",
    "backlink_publisher.sdk.api -> backlink_publisher.cli._report_engine",
    # keepalive -> SDK (SDK wraps CLI)
    "backlink_publisher.keepalive.chain -> backlink_publisher.sdk.api",
]

[[tool.importlinter.contracts]]
name = "_util must not import from domain or cli"
type = "forbidden"
source_modules = ["backlink_publisher._util"]
forbidden_modules = [
    "backlink_publisher.cli",
    "backlink_publisher.publishing",
    "backlink_publisher.keepalive",
    "backlink_publisher.events",
    "backlink_publisher._validate_engine",
    "backlink_publisher.config",
    "backlink_publisher.content",
    "backlink_publisher.linkcheck",
    "backlink_publisher.gap",
    "backlink_publisher.recheck",
    "backlink_publisher.referral",
    "backlink_publisher.health",
    "backlink_publisher.canary",
    "backlink_publisher.ledger",
    "backlink_publisher.idempotency",
    "backlink_publisher.optimization",
    "backlink_publisher.scorecard",
    "backlink_publisher._dispatch_router",
    "backlink_publisher.gates",
    "backlink_publisher.schedule",
    "backlink_publisher.audit",
    "backlink_publisher.geo",
    "backlink_publisher.click_track",
    "backlink_publisher.llm",
	    "backlink_publisher.gsc",
	    "backlink_publisher.anchor",
]
# Pre-existing _util -> domain violations (P14 A1-A5: all resolved -- violations
# extracted to _util.paths, _util.text_validation, _util.constants):
ignore_imports = [
