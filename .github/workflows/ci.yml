name: Backlink Publisher CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ── Shared setup (composite action placeholder) ──────────────────────────────
# Each tier reuses the same checkout → setup-python → pip-install prefix.
# A composite action would deduplicate YAML but adds an indirection layer;
# for 3 jobs the repetition is manageable and the WET YAML keeps the CI
# workflow self-contained.
#
# PYTHONHASHSEED=0 is required by the Footprint Regression Gate (Plan Unit 6 /
# R10) at interpreter startup. Setting it inside Python is a no-op — Python
# freezes hash randomization at process start. pyproject's
# [tool.pytest.ini_options].env also pins it via pytest-env, but the job-level
# env here protects subprocess invocations.

env:
  PYTHONHASHSEED: "0"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # U1U2: Unit tests — fast, isolated, no external dependencies
  # ═══════════════════════════════════════════════════════════════════════════
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache .venv
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-venv-${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          pip install -e ".[dev]"

      - name: Security audit (pip-audit)
        # Scans installed packages for known CVEs. Non-blocking (continue-on-error)
        # so a newly published CVE doesn't block CI — the unit/integration gate
        # still runs. Review the audit log and pin vulnerable deps in pyproject.toml
        # when actionable.
        run: |
          pip install pip-audit
          pip-audit --desc on --strict
        continue-on-error: true

      - name: Print radon version
        run: python -m radon --version

      - name: Run unit tests (seam — no reruns)
        # C1a (Plan 2026-06-30-001, R9): a single global --reruns flag across
        # the whole unit tier silently masks real intermittent failures in
        # tests that touch persistence/IO-heavy "seam" modules (events/gap/
        # idempotency/ledger/webui_app.api). tests/conftest.py statically
        # AST-scans each test module's own import statements for those
        # module families and auto-applies pytest.mark.seam (see
        # _SEAM_IMPORT_PREFIXES there) — no per-file marker list to maintain.
        # This step runs the seam-classified subset (790 of 9887 unit tests
        # as of 2026-07-02) WITHOUT --reruns: a red run here must stay red
        # rather than get silently retried away, because these are exactly
        # the modules where a flake is most likely to be a real bug.
        # --cov-report= (no report emitted yet) — the combined report across
        # both steps is written after unit-rest below via --cov-append, so
        # coverage from this step is tracked, not dropped.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=15 -n auto -m "unit and seam" --strict-markers --strict-config --cov --cov-branch --cov-report=

      - name: Run unit tests (rest — reruns enabled)
        # -n auto (pytest-xdist) parallelises across the runner's cores. This
        # is the non-seam subset (9097 of 9887 unit tests as of 2026-07-02):
        # fast, isolated tests with no seam-module import, where a rerun is
        # safe because ordinary CI-environment flakiness (timing, xdist
        # worker scheduling) is a far more likely cause than the persistence/
        # state-heavy failure modes --reruns would mask in the seam subset
        # above. Classification is import-based/automatic; the only manual
        # bookkeeping is tests/conftest.py's
        # _SEAM_COINCIDENTAL_IMPORT_EXCLUSIONS — a one-time, shrink-only list
        # of files whose seam-module import is coincidental (e.g. reads a
        # static constant with zero interaction with seam runtime behavior),
        # each entry requiring a rationale comment.
        # --timeout=15 per-test (pytest-timeout) is shorter than integration/e2e.
        # --strict-markers catches any module-level __tier__ drift (and would
        # hard-fail collection if `seam` were applied without being
        # registered in pyproject.toml's markers list).
        # --cov-append merges onto the unit-seam step's coverage data so the
        # json report below reflects BOTH steps combined.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=15 -n auto -m "unit and not seam" --strict-markers --strict-config --cov --cov-branch --cov-append --cov-report=term --cov-report=json:coverage-unit.json --reruns 2 --reruns-delay 1

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit-${{ matrix.python-version }}
          path: coverage-unit.json
          if-no-files-found: error

      - name: Validate syntax (py_compile + ast.parse)
        run: |
          python -c "
          import py_compile, ast, sys, pathlib
          root = pathlib.Path('.')
          errors = 0
          for f in sorted(root.rglob('*.py')):
              if any(p in f.parts for p in ('__pycache__', '.venv', 'node_modules', '.mypy_cache', '.pytest_cache')):
                  continue
              # py_compile
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  print(f'[FAIL] py_compile: {e}')
                  errors += 1
              # ast.parse (catches syntax errors py_compile might miss)
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  print(f'[FAIL] ast.parse: {f}: {e}')
                  errors += 1
          if errors:
              sys.exit(f'❌ {errors} file(s) failed syntax validation')
          else:
              print(f'✅ All {len(list(root.rglob(\"*.py\")))} Python files passed syntax validation')
          "

      - name: Check code style (ruff)
        run: |
          ruff check src/ webui_app/ webui_store/

      - name: Check import constraints (import-linter)
        run: |
          pip install import-linter
          lint-imports

      - name: Verify fixtures exist
        run: |
          python generate_fixtures.py
          test -f fixtures/seed.jsonl

      - name: Type check (mypy)
        run: |
          python -m mypy src/backlink_publisher

  # ═══════════════════════════════════════════════════════════════════════════
  # U2: Integration tests — touch disk, database, or external fakes
  # Runs on both PR and push to main to catch regressions early.
  # ═══════════════════════════════════════════════════════════════════════════
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache .venv
        uses: actions/cache@v4
        id: venv-cache-integration
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-venv-${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.venv-cache-integration.outputs.cache-hit != 'true'
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        # Longer per-test timeout (60s) — integration tests may touch SQLite,
        # filesystem, or spawn subprocesses.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 -n auto -m "integration" --strict-markers --strict-config

      - name: Full-suite coverage gate (R18)
        # Run without -m filter to measure combined coverage. --cov-fail-under=80
        # is set on the CLI, not addopts, to avoid conftest module-load silencing
        # (see docs/solutions/test-failures/strict-markers-addopts-noop-conftest-module-load-2026-06-01.md).
        # Baseline: 83.2% measured 2026-06-09; floor set at 80% to prevent
        # regressions. Both pre-reconcile lineages carried this gate; the
        # debt-registry claim 'no-coverage-gate: resolved' depends on it
        # (tests/test_debt_registry_freshness.py).
        run: |
          python -m pytest tests/ --tb=short --timeout=60 -n auto --strict-markers --strict-config --cov --cov-branch --cov-report=term --cov-report=json:coverage-full.json --cov-fail-under=80

      - name: Upload full coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-full-${{ matrix.python-version }}
          path: coverage-full.json
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # U2: E2E tests — full end-to-end requiring real network or browser
  # Runs on both PR and push to main.
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache .venv
        uses: actions/cache@v4
        id: venv-cache-e2e
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-venv-${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.venv-cache-e2e.outputs.cache-hit != 'true'
        run: |
          pip install -e ".[dev]"

      - name: Run e2e tests
        # Single-core (no xdist) — e2e tests share state or hit real endpoints.
        # Per-test timeout 120s for network-bound assertions.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=120 -m "e2e" --strict-markers --strict-config

  # ═══════════════════════════════════════════════════════════════════════════
  # C2 (Plan 2026-06-30-001): Performance benchmark diff gate — advisory only.
  # Records pytest-benchmark results for tests/test_benchmarks.py on every run,
  # publishes main's result as the baseline artifact future PRs compare
  # against, and on PRs diffs the PR's numbers against that baseline. This is
  # the first CI benchmark gate for this repo, so it is warn-only end to end
  # (mirrors the "advisory (warn-only)" contract already documented in
  # tests/test_benchmarks.py's own module docstring) — nothing here fails the
  # build.
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read  # required to look up + download main's baseline artifact from a prior run

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run benchmarks
        # continue-on-error: tests/test_benchmarks.py is already covered by the
        # unit job above (it carries __tier__ = "unit"); a correctness failure
        # there is that job's problem to flag red, not this advisory perf
        # job's. --benchmark-json still gets written with whatever benchmarks
        # completed before any such failure, so partial data still feeds the
        # comparison step below rather than the whole job going dark.
        continue-on-error: true
        run: |
          python -m pytest tests/test_benchmarks.py --benchmark-only --benchmark-json=benchmark-result.json -v --tb=short

      - name: Upload benchmark result
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-result-${{ github.sha }}
          path: benchmark-result.json
          if-no-files-found: error

      - name: Publish baseline artifact (main only)
        # Fixed artifact name (not keyed by sha) so the "find latest main
        # baseline run" step below only ever needs the most recent successful
        # run of this workflow on main — no manual pruning of old baselines.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-baseline
          path: benchmark-result.json
          if-no-files-found: error

      - name: Find latest main baseline run
        if: github.event_name == 'pull_request'
        id: baseline_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --repo "${{ github.repository }}" --branch main --workflow "${{ github.workflow }}" --status success --json databaseId --jq '.[0].databaseId' || true)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download main baseline
        if: github.event_name == 'pull_request' && steps.baseline_run.outputs.run_id != ''
        continue-on-error: true  # missing/expired baseline artifact must not fail the job — see compare step
        uses: actions/download-artifact@v8
        with:
          name: benchmark-baseline
          path: baseline
          run-id: ${{ steps.baseline_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare against main baseline (warn-only, 20% threshold)
        # 20%: deliberately lenient starting point (Plan 2026-06-30-001 risk
        # register: "CI benchmark diff gate too strict -> mitigation: initial
        # threshold 20%, tighten later"). This is the first benchmark gate
        # this repo has had, and pytest-benchmark wall-clock timings on
        # shared GitHub-hosted runners are noisy on their own (CPU steal from
        # co-scheduled jobs can swing double digits with zero code change) —
        # a tight threshold on an uncalibrated gate would flag runner noise
        # as regressions. Tighten once real-world variance is measured.
        # scripts/compare_benchmarks.py always exits 0 (warn-only — see its
        # module docstring); this step never fails the build.
        if: github.event_name == 'pull_request'
        run: |
          python scripts/compare_benchmarks.py --baseline baseline/benchmark-result.json --current benchmark-result.json --threshold-pct 20

  # ═══════════════════════════════════════════════════════════════════════════
  # C3 (Plan 2026-06-30-001): SPA build/lint gate. frontend/ is a Vue 3 + Vite
  # SPA with no prior CI coverage at all — this job typechecks it (tsc
  # --noEmit) and builds the production bundle (vite build) on every push/PR,
  # additive to the Python jobs above (unit/integration/e2e/benchmark are
  # untouched).
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24: frontend/package.json has no "engines" field and there is
          # no .nvmrc in this repo to pin from, so this is a deliberate choice
          # rather than an inferred one. Verified locally (2026-07-02) against
          # frontend/node_modules/vite/package.json, which declares
          # "engines": { "node": "^20.19.0 || >=22.12.0" } — Node 24 satisfies
          # that comfortably and is Active LTS on this date (Node 22 went
          # Active LTS Oct 2024, Node 24 took over Active LTS Oct 2025), so it
          # has the longest support runway of the two options.
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        # npm ci (not npm install): reproducible installs from the committed
        # frontend/package-lock.json, matching the convention already used by
        # `pip install -e ".[dev]"` (exact deps, no resolver drift) in the
        # Python jobs above. Requires the lockfile to exist and be in sync
        # with package.json — both true here.
        run: |
          cd frontend && npm ci

      - name: Type check + build SPA
        # Exact commands verified locally in Sprint C3 (2026-07-02) before
        # being mirrored here, per this repo's convention of hand-verifying
        # CI commands rather than trusting them unrun (see C2's
        # scripts/compare_benchmarks.py local-test note above).
        #
        # Known current failure mode (NOT introduced by this job, not fixed
        # here — out of scope per Sprint C3): `npx tsc --noEmit` currently
        # exits 2 because of pre-existing @types/node gaps (bare `node:fs` /
        # `node:path` / `node:url` / `process` references in
        # src/__tests__/*.spec.ts and src/api/client.ts, plus two implicit-
        # `any` parameters in theme-light-tokens.spec.ts) that predate this
        # job. `npx vite build` on its own succeeds cleanly (exit 0) and
        # correctly emits the production bundle to ../webui_app/spa_dist —
        # i.e. webui_app/spa_dist/ at the repo root, per vite.config.ts's
        # build.outDir — which is the path Flask's /app/* route serves from.
        # This job will show red until the @types/node gap is closed in a
        # follow-up unit; that is a real, separate fix, not a reason to
        # relax or drop the type-check step here.
        run: |
          cd frontend && npx tsc --noEmit && npx vite build

  # ═══════════════════════════════════════════════════════════════════════════
  # Mutation testing — advisory only (continue-on-error).
  # Tests test quality by mutating code and checking if tests catch the changes.
  # Initially targets high-value pure-function modules only.
  # ═══════════════════════════════════════════════════════════════════════════
  # ── Legacy static JS syntax gate ──────────────────────────────────────
  # Closes the gap that let an orphaned top-level brace in notifications.js
  # (fix 85a9e1a7) ship silently to every legacy Jinja page for over a
  # week. The SPA lane (frontend.yml) path-filters on frontend/** and never
  # reaches webui_app/static/js/**, and frontend-lint below only builds
  # frontend/, so the legacy ES modules had zero CI syntax coverage. This
  # job runs node --check over every file under webui_app/static/js on every
  # push/PR (unfiltered), failing the build on any parse error.
  legacy-js-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax-check legacy static JS (node --check)
        # test_static_js_syntax.mjs walks webui_app/static/js/** and runs
        # `node --check` on each .js, failing with file + diagnostic on any
        # syntax error. Self-locates the repo root from its own URL.
        run: |
          node --test tests/js/test_static_js_syntax.mjs

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run mutation tests
        # Advisory only — mutation testing is slow and can be noisy.
        # Targets high-value pure-function modules: _util/url.py, _util/errors.py.
        continue-on-error: true
        run: |
          PYTHONHASHSEED=0 PYTHONPATH=src mutmut run \
            --paths-to-mutate=src/backlink_publisher/_util/url.py,src/backlink_publisher/_util/errors.py \
            --tests-dir=tests/ \
            --runner="python -m pytest -x -q" \
            --use-comma-separator