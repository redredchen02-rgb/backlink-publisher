rationale = "Until this registry was introduced, there was no centralized mechanism to track, prioritize, or trend technical debt across the project. Debt decisions lived in PR descriptions and commit messages — invisible to anyone not following every PR. This entry is 'accepted' because the registry itself resolves it."
