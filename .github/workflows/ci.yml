name: Backlink Publisher CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ── Shared setup (composite action placeholder) ──────────────────────────────
# Each tier reuses the same checkout → setup-python → pip-install prefix.
# A composite action would deduplicate YAML but adds an indirection layer;
# for 3 jobs the repetition is manageable and the WET YAML keeps the CI
# workflow self-contained.
#
# PYTHONHASHSEED=0 is required by the Footprint Regression Gate (Plan Unit 6 /
# R10) at interpreter startup. Setting it inside Python is a no-op — Python
# freezes hash randomization at process start. pyproject's
# [tool.pytest.ini_options].env also pins it via pytest-env, but the job-level
# env here protects subprocess invocations.

env:
  PYTHONHASHSEED: "0"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # U1U2: Unit tests — fast, isolated, no external dependencies
  # ═══════════════════════════════════════════════════════════════════════════
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Security audit (pip-audit)
        # Scans installed packages for known CVEs. Non-blocking (continue-on-error)
        # so a newly published CVE doesn't block CI — the unit/integration gate
        # still runs. Review the audit log and pin vulnerable deps in pyproject.toml
        # when actionable.
        run: |
          pip install pip-audit
          pip-audit --desc on --strict
        continue-on-error: true

      - name: Print radon version
        run: python -m radon --version

      - name: Run unit tests
        # -n auto (pytest-xdist) parallelises across the runner's cores. The unit
        # tier is the biggest subset (8287 tests) but each test is fast and
        # isolated — determinism-verified under workers (see PYTHONHASHSEED=0).
        # --timeout=15 per-test (pytest-timeout) is shorter than integration/e2e.
        # --strict-markers catches any module-level __tier__ drift.
        # --cov includes branch coverage in report/json, excluding test files.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=15 -n auto -m "unit" --strict-markers --strict-config --cov --cov-branch --cov-report=term --cov-report=json:coverage-unit.json --reruns 2 --reruns-delay 1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.python-version }}
          path: coverage-unit.json
          if-no-files-found: error

      - name: Validate syntax (py_compile + ast.parse)
        run: |
          python -c "
import py_compile, ast, sys, pathlib
root = pathlib.Path('.')
errors = 0
for f in sorted(root.rglob('*.py')):
    if any(p in f.parts for p in ('__pycache__', '.venv', 'node_modules', '.mypy_cache', '.pytest_cache')):
        continue
    # py_compile
    try:
        py_compile.compile(f, doraise=True)
    except py_compile.PyCompileError as e:
        print(f'[FAIL] py_compile: {e}')
        errors += 1
    # ast.parse (catches syntax errors py_compile might miss)
    try:
        ast.parse(f.read_text(encoding='utf-8'))
    except SyntaxError as e:
        print(f'[FAIL] ast.parse: {f}: {e}')
        errors += 1
if errors:
    sys.exit(f'❌ {errors} file(s) failed syntax validation')
else:
    print(f'✅ All {len(list(root.rglob(\"*.py\")))} Python files passed syntax validation')
"

      - name: Check code style (ruff)
        run: |
          ruff check src/ webui_app/ webui_store/

      - name: Check import constraints (import-linter)
        run: |
          pip install import-linter
          lint-imports

      - name: Verify fixtures exist
        run: |
          python generate_fixtures.py
          test -f fixtures/seed.jsonl

      - name: Type check (mypy)
        run: |
          python -m mypy src/backlink_publisher --config-file mypy.ini

  # ═══════════════════════════════════════════════════════════════════════════
  # U2: Integration tests — touch disk, database, or external fakes
  # ═══════════════════════════════════════════════════════════════════════════
  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        # Longer per-test timeout (60s) — integration tests may touch SQLite,
        # filesystem, or spawn subprocesses.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 -n auto -m "integration" --strict-markers --strict-config

      - name: Full-suite coverage gate (R18)
        # Run without -m filter to measure combined coverage. --cov-fail-under=80
        # is set on the CLI, not addopts, to avoid conftest module-load silencing
        # (see docs/solutions/test-failures/strict-markers-addopts-noop-conftest-module-load-2026-06-01.md).
        # Baseline: 83.2% measured 2026-06-09; floor set at 80% to prevent regressions.
        run: |
          python -m pytest tests/ --tb=short --timeout=60 -n auto --strict-markers --strict-config --cov --cov-branch --cov-report=term --cov-report=json:coverage-full.json --cov-fail-under=80

      - name: Upload full coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-full-${{ matrix.python-version }}
          path: coverage-full.json
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # U2: E2E tests — full end-to-end requiring real network or browser
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run e2e tests
        # Single-core (no xdist) — e2e tests share state or hit real endpoints.
        # Per-test timeout 120s for network-bound assertions.
        run: |
          python -m pytest tests/ -v --tb=short --timeout=120 -m "e2e" --strict-markers --strict-config