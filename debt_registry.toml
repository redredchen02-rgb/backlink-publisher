# Debt Registry — known technical debt items.
#
# Schema (enforced by tests/test_debt_registry_format.py):
#   each [[items]] entry MUST have:
#     slug       -- string, unique identifier
#     severity   -- low | medium | high | critical
#     rationale  -- string, >=80 chars explaining why this debt exists
#     discovered -- ISO date (YYYY-MM-DD)
#     owner      -- string (initially "unassigned")
#     status     -- open | mitigated | accepted | resolved
#     resolved_date -- ISO date (YYYY-MM-DD), REQUIRED when status is
#                      "resolved" or "mitigated"; must not be present for
#                      "open" or "accepted". Leaves a reviewable timestamp
#                      so 'closing' a debt is never silent.
#     location   -- array of strings, each "relative/path.py:<line_number>"
#                   pointing at the line of a `# debt: <slug>` comment (the
#                   comment's own line, not the except handler's line). D2b
#                   〔plan 2026-06-30-001〕: REQUIRED iff this entry's slug is
#                   referenced by at least one `# debt: <slug>` comment
#                   anywhere in the codebase; entries with no such comment
#                   (pre-D2 registry-only debt, e.g. ko-corpus-calibration)
#                   omit it entirely. Line-number format was chosen over
#                   `path.py:function_name` because it is the value the
#                   cross-reference scanner can compute directly from the
#                   comment's own AST/regex match with no extra resolution
#                   step, and it stays exact even inside nested/anonymous
#                   scopes where "function_name" would be ambiguous. An
#                   entry MAY list more than one location when a single
#                   reviewed rationale deliberately covers multiple call
#                   sites documented together (e.g. several cascading
#                   except-Exception sites in the same function or sibling
#                   functions fixed as one unit) — this is not a loophole:
#                   test_cross_reference_debt_comments_have_registry_entries
#                   in tests/test_debt_registry_format.py still requires
#                   EVERY individual `# debt: <slug>` comment's own file:line
#                   to appear in that slug's location array, so a genuinely
#                   NEW call site pasting an existing slug without adding
#                   its own location entry fails the cross-reference check.
#
# Anti-gaming rules added by D2b (structural, not text-similarity — see
# tests/test_seam_except_classification.py module docstring for why a
# difflib.SequenceMatcher reason-similarity check was tried and rejected):
#   - every (slug, location) pair across the whole registry must be unique
#     (test_slug_location_pairs_unique) — no two entries may claim the same
#     call site
#   - no two entries may share a byte-for-byte identical `rationale` string
#     (test_no_exact_duplicate_rationale) — catches copy-paste-without-
#     editing, not reworded duplicates (deliberately out of scope)
#
# Adding an item requires editing this file in the PR that surfaces the debt.
# There is no override label. The defense is `git blame` -- every intentional
# addition leaves a reviewable record with rationale.

