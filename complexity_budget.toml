# Test-file SLOC budgets (enforced by test_no_complexity_regrowth.py).
# Each entry is a repo-relative .py path with:
#   ceiling  -- int, SLOC (logical lines of code via radon raw -s)
#   rationale -- string, >=80 chars explaining why the file is large.
#
# Seed values are exact current SLOC + round_up_to_10 (same convention as
# monolith_budget.toml), providing ~10-line breathing room. Regular entries
# hold the line against test-file SLOC growth; bump in the same PR with a
# rationale update.

