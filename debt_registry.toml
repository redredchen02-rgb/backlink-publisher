[[items]]
slug = "no-recon-schema"
severity = "low"
rationale = "RECON events are emitted ad-hoc with no formal taxonomy or typed schema, making automated analysis (search, aggregation, alerting) fragile. A typed taxonomy would let downstream consumers rely on structured fields instead of string-matching on human-readable messages. Mitigated 2026-06-15: the text-RECON contract is now formalised in _util/recon.py (RECONLine/emit_recon/parse_recon_line with bare-flag support matching the real plan-check/publish-backlinks shapes) and locked by tests/test_recon_schema.py incl. a real-repo-lines contract test. Residual: ~14 hand-rolled emit sites not yet migrated to emit_recon() — incremental follow-up, no longer a schema gap."
discovered = "2026-06-04"
owner = "unassigned"
status = "mitigated"
resolved_date = "2026-06-15"

