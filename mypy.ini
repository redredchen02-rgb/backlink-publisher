[mypy]
python_version = 3.11
# Type-check against the Linux platform (the deployment/CI target) so local
# Windows dev machines stop reporting cross-platform false positives such as
# fcntl.LOCK_UN. The project is Linux-deployed; CI remains the source of truth.
platform = "linux"
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_any_generics = False
disallow_subclassing_any = False
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
show_error_context = True
show_column_numbers = True
pretty = True
ignore_missing_imports = True

# webui_store is outside strict scope — suppress transitive warn_return_any
# noise that leaks through schema.py → medium_browser.py → webui_store/.
[mypy-webui_store.*]
warn_return_any = False
disallow_untyped_defs = False
