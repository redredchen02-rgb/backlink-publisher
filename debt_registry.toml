slug = "monitor-summary-aggregator-fail-open"
severity = "low"
rationale = "webui_app/api/v1/monitor.py::monitor_summary keeps a bare except Exception around _build_anomaly_cards(_collect_subsystem_status()) and degrades to an empty degraded=True payload. Each subsystem already degrades individually to an 'unavailable' card; this outer catch is documented belt-and-suspenders for a catastrophic aggregator failure, matching the module's own fail-open design note, and the endpoint carries no credentials so there is nothing sensitive to leak."
discovered = "2026-07-02"
owner = "unassigned"
status = "accepted"
