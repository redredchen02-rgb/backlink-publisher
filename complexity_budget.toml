# Cyclomatic-complexity (CC) budget + Test-file SLOC budget.
# Sibling to monolith_budget.toml (which gates file SLOC); the [functions] section
# gates per-function radon cyclomatic complexity, and the [test_files] section gates
# per-file radon SLOC for test files. See:
# - docs/plans/2026-05-29-005-feat-cyclomatic-complexity-budget-plan.md
# - docs/brainstorms/2026-05-29-cyclomatic-complexity-budget-requirements.md
#
# Schema (enforced by tests/test_no_complexity_regrowth.py):
#   each [functions."<relpath>::<radon fullname>"] entry MUST have:
#     ceiling   -- int, radon CC ceiling for that function/method
#     rationale -- string, >=80 chars explaining current shape + why it is high
#
# Enforcement model = named set + high backstop:
#   (a) every function listed here is held to its individual `ceiling` (no regrowth);
#   (b) every function NOT listed is held to a global backstop of CC 30 (the BACKSTOP
#       constant in the test). Seed floor = backstop + 1 = 31, so there is no
#       un-gated over-backstop gap. A born-complex new function hard-fails CI.
#
# Keys are FULL repo-relative paths (str(path.relative_to(repo_root))) joined by
# "::" to radon's block fullname ("module_func" or "Class.method"). Truncated keys
# silently miss the block and fall into the backstop branch.
#
# CC seed convention = exact current CC, zero headroom (unlike monolith's
# round_up_to_10(SLOC+30)). CC values are small integers; a function pinned at its
# exact CC cannot gain a branch without a same-PR ceiling bump + updated rationale.
# Bumping a ceiling requires editing this file in the SAME PR that grows the
# monitored function. The defense is `git blame` -- every bump leaves a reviewable
# record with rationale. A radon version bump re-baselines every ceiling here and
# the CC canary (tests/fixtures/cc_canary.py) in the same PR.

