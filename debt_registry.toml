[[items]]
slug = "bind-channel-main-catchall-message-scrubbed-fixed"
severity = "critical"
rationale = "cli/admin/bind_channel.py::main()'s two catch-all except arms (`except PipelineError` and `except Exception`) used to emit `channel.bind.failed` with `message=str(exc)` completely unscrubbed — this is the actual unfiltered exit point on the stdout->WebUI chain (driver._emit -> webui_app/services/bind_job.py's BindJob.events list, appended and returned verbatim by the poll API with no filtering layer), reachable by any exception outside run_bind()'s five enumerated types (e.g. a bare RuntimeError from chrome_backend.py's _CdpClient.send()). Fixed: both sites now pass str(exc) through events/scrubber.py::scrub_text() before it is embedded in the emitted `message` field. Verified by a red-path test that makes run_bind() raise a plain RuntimeError carrying cookie-shaped text and asserts the final channel.bind.failed event's message field is scrubbed before it would reach the poll API response."
discovered = "2026-07-06"
owner = "unassigned"
status = "resolved"
resolved_date = "2026-07-06"
location = [
    "src/backlink_publisher/cli/admin/bind_channel.py:127",
]

[[items]]
slug = "chrome-backend-profile-dir-error-code-contract-fixed"
severity = "high"
rationale = "chrome_backend.py::_chrome_profile_dir used to do `raise ChromeLaunchError(str(exc)) from exc`, stuffing the wrapped _ChromeSessionError's own free-text message into error_code — a field webui_app/services/bind_job.py treats as a closed enum via BIND_ERROR_MESSAGES.get(error_code, ...). Fixed to raise a fixed literal code ('chrome_not_available', matching this class's own default and this module's existing-code convention) and carry the wrapped exception's scrub_text()-cleaned message on a new, separate `detail` attribute that bind_job.py's poll API never reads as an enum value. Verified by a red-path test asserting error_code is always the fixed literal and never contains the injected exception text, even when the wrapped exception's message is adversarially crafted to look like a plausible alternate error_code."
discovered = "2026-07-06"
owner = "unassigned"
status = "resolved"
resolved_date = "2026-07-06"
