# Debt Registry — known technical debt items.
#
# Schema (enforced by tests/test_debt_registry_format.py):
#   each [[items]] entry MUST have:
#     slug       -- string, unique identifier
#     severity   -- low | medium | high | critical
#     rationale  -- string, >=80 chars explaining why this debt exists
#     discovered -- ISO date (YYYY-MM-DD)
#     owner      -- string (initially "unassigned")
#     status     -- open | mitigated | accepted | resolved
#     resolved_date -- ISO date (YYYY-MM-DD), REQUIRED when status is
#                      "resolved" or "mitigated"; must not be present for
#                      "open" or "accepted". Leaves a reviewable timestamp
#                      so 'closing' a debt is never silent.
#
# Adding an item requires editing this file in the PR that surfaces the debt.
# There is no override label. The defense is `git blame` -- every intentional
# addition leaves a reviewable record with rationale.

[[items]]
slug = "test-tier-coverage-incomplete"
severity = "low"
rationale = "Only a subset of tests carry tier markers (unit/integration/e2e), making targeted test selection impossible. At ~160 test files and ~96K lines, the suite needs tier metadata so CI can run unit-only on quick pushes and full-stack only on merge."
discovered = "2026-06-04"
owner = "unassigned"
status = "mitigated"
resolved_date = "2026-06-15"

[[items]]
slug = "no-recon-schema"
severity = "low"
rationale = "RECON events are emitted ad-hoc with no formal taxonomy or typed schema, making automated analysis (search, aggregation, alerting) fragile. A typed taxonomy would let downstream consumers rely on structured fields instead of string-matching on human-readable messages. Mitigated 2026-06-15: the text-RECON contract is now formalised in _util/recon.py (RECONLine/emit_recon/parse_recon_line with bare-flag support matching the real plan-check/publish-backlinks shapes) and locked by tests/test_recon_schema.py incl. a real-repo-lines contract test. Residual: ~14 hand-rolled emit sites not yet migrated to emit_recon() — incremental follow-up, no longer a schema gap."
discovered = "2026-06-04"
owner = "unassigned"
status = "mitigated"
resolved_date = "2026-06-15"

[[items]]
slug = "no-health-surface"
severity = "high"
rationale = "The system has no runtime health endpoint (/health or similar) to expose liveness, dependency status, or last-operation timestamp. Operators and cron wrappers currently infer health from exit codes alone — no way to detect a hung worker or degraded dependency mid-run."
discovered = "2026-06-04"
owner = "unassigned"
status = "resolved"
resolved_date = "2026-06-09"

[[items]]
slug = "no-coverage-gate"
severity = "medium"
rationale = "Coverage data is computed but never enforced in CI — there is no minimum threshold that fails a build. Without a coverage gate, untested new code can land silently, and the existing ~160 test files provide no quantitative safety guarantee for contribution quality."
discovered = "2026-06-04"
owner = "unassigned"
status = "resolved"
resolved_date = "2026-06-09"

[[items]]
slug = "orphan-code-unknown"
severity = "low"
rationale = "There is no systematic orphan-detection facility (dead code scanner, import-graph audit, or coverage-based reachability analysis). Unused functions, dead conditional branches, and vestigial CLI flags accumulate silently, increasing maintenance surface without corresponding value. Mitigated 2026-06-15: file-level orphan detection already existed (tests/test_no_orphan_code.py + scripts/scan_orphan_code.py); now complemented by tests/test_dead_code_advisory.py running vulture at >=80% confidence as an ADVISORY UserWarning canary (advisory not hard-fail because vulture can't see register-by-string / pyproject entry points / Jinja call sites). 7 baseline findings allowlisted as reachable-by-pattern FPs; new dead code now surfaces in CI warnings."
discovered = "2026-06-04"
owner = "unassigned"
status = "mitigated"
resolved_date = "2026-06-15"

[[items]]
slug = "largest-test-file-bloat"
severity = "medium"
rationale = "test_webui_route_contract.py stands at ~1647 SLOC — by far the largest test file in the suite. Its size slows collection, makes targeted debugging harder, and increases the likelihood of merge conflicts when multiple branches touch WebUI routes simultaneously."
discovered = "2026-06-04"
owner = "unassigned"
status = "resolved"
resolved_date = "2026-06-09"

[[items]]
slug = "no-stewardship-model"
severity = "low"
rationale = "Domain ownership across the ~160 source + test files is implicit — no CODEOWNERS or module-level stewardship annotations exist. New contributors and automation agents cannot determine who to consult for a given module without spelunking git blame, slowing both reviews and onboarding."
discovered = "2026-06-04"
owner = "unassigned"
status = "open"

[[items]]
slug = "no-debt-tracking"
severity = "low"
rationale = "Until this registry was introduced, there was no centralized mechanism to track, prioritize, or trend technical debt across the project. Debt decisions lived in PR descriptions and commit messages — invisible to anyone not following every PR. This entry is 'accepted' because the registry itself resolves it."
discovered = "2026-06-04"
owner = "unassigned"
status = "accepted"

[[items]]
slug = "debt-registry-staleness"
severity = "medium"
rationale = "As of the 2026-06-15 audit, the registry itself had drifted: 5 of 8 items marked 'open' were in fact already resolved by v0.4.0 work (health surface, coverage gate, test split, tier markers). A registry that lies is worse than no registry. Mitigated by adding a resolved_date field + format-test enforcement, and by a recurring 'debt-report' freshness pass (see docs/plans/2026-06-15-002 P2-2). The structural risk of re-drift remains until freshness checking is automated."
discovered = "2026-06-15"
owner = "unassigned"
status = "mitigated"
resolved_date = "2026-06-15"
